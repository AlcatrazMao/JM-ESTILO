name = "jm-estilo-worker"
main = "src/index.ts"
compatibility_date = "2024-01-17"

[vars]
ENVIRONMENT = "development"

[[d1_databases]]
binding = "DB"
database_name = "jm-estilo-db"
database_id = "your-d1-database-id"

[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "jm-estilo-uploads"

# Production environment
[env.production]
name = "jm-estilo-worker-prod"

[env.production.vars]
ENVIRONMENT = "production"

[env.production.d1_databases]
binding = "DB"
database_name = "jm-estilo-db-prod"
database_id = "your-prod-d1-database-id"

[env.production.r2_buckets]
binding = "R2_BUCKET"
bucket_name = "jm-estilo-uploads-prod"