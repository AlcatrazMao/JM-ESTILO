name = "jm-estilo-worker"
main = "src/index.ts"
compatibility_date = "2024-01-17"

[vars]
ENVIRONMENT = "development"
CORS_ORIGIN = ""

[[d1_databases]]
binding = "DB"
database_name = "jm-estilo-db"
database_id = "your-d1-database-id"

# Production environment
[env.production]
name = "jm-estilo-worker-prod"

[env.production.vars]
ENVIRONMENT = "production"
CORS_ORIGIN = ""

[[env.production.d1_databases]]
binding = "DB"
database_name = "jm-estilo-db-prod"
database_id = "your-prod-d1-database-id"
